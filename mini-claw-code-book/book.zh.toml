[book]
title = "用 Rust 构建你自己的迷你编程智能体"
authors = ["mini-claw-code contributors"]
language = "zh"
src = "zh"

[build]
build-dir = "book/zh"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html]
additional-js = ["mermaid.min.js", "mermaid-init.js", "lang-switcher.js"]
additional-css = ["lang-switcher.css"]
site-url = "/mini-claw-code/zh/"
git-repository-url = "https://github.com/odysa/mini-claw-code"
git-repository-icon = "fab-github"
