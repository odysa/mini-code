name: Deploy Book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          mkdir -p bin
          MDBOOK_URL=$(gh release view --repo rust-lang/mdBook --json assets --jq '.assets[] | select(.name | test("x86_64-unknown-linux-gnu.tar.gz$")) | .url')
          curl -sSL "$MDBOOK_URL" | tar -xz -C bin
          MERMAID_URL=$(gh release view --repo badboy/mdbook-mermaid --json assets --jq '.assets[] | select(.name | test("x86_64-unknown-linux-gnu.tar.gz$")) | .url')
          curl -sSL "$MERMAID_URL" | tar -xz -C bin
          echo "$PWD/bin" >> $GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build book
        run: mdbook build mini-claw-code-book

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mini-claw-code-book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
